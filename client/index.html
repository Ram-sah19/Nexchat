<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure E2EE Chat</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ─── Auth Screen ───────────────────────────────────────────────────── -->
  <div id="auth-container">
    <div class="card">
      <div class="logo-wrapper">
        <i class="ph-fill ph-shield-check text-gradient"></i>
      </div>
      <h2>Secure Chat</h2>
      <p class="subtitle">End-to-End Encrypted</p>
      
      <div id="auth-error" class="hidden error-msg"></div>

      <div class="input-group">
        <i class="ph ph-user"></i>
        <input type="text" id="username" placeholder="Username" autocomplete="off">
      </div>
      <div class="input-group">
        <i class="ph ph-lock-key"></i>
        <input type="password" id="password" placeholder="Password" autocomplete="off">
      </div>
      
      <div class="actions">
        <button id="login-btn" class="primary-btn">
          <span>Login</span> <i class="ph-bold ph-arrow-right"></i>
        </button>
        <button id="register-btn" class="secondary-btn">Register</button>
      </div>
    </div>
  </div>

  <!-- ─── Chat Screen ───────────────────────────────────────────────────── -->
  <div id="chat-container" class="hidden">
    <div class="sidebar">

      <!-- User Profile Header -->
      <div class="user-profile">
        <div class="user-info">
          <div class="avatar"><i class="ph-fill ph-user-circle"></i></div>
          <span id="current-username" class="sidebar-text"></span>
        </div>
        <div class="sidebar-actions">
          <button id="collapse-btn" class="icon-btn" title="Toggle sidebar">
            <i class="ph-bold ph-sidebar-simple"></i>
          </button>
          <button id="logout-btn" class="icon-btn" title="Logout">
            <i class="ph-bold ph-sign-out"></i>
          </button>
        </div>
      </div>

      <!-- Scrollable Sidebar Content -->
      <div class="sidebar-content">

        <!-- Incoming Friend Requests Notification Panel -->
        <div id="friend-requests-panel" class="hidden"></div>

        <!-- Section B: My Friends (Chat Zone) -->
        <div class="section-label">
          <i class="ph-bold ph-chat-circle-dots"></i>
          <span>My Friends</span>
        </div>
        <ul id="friends-list"></ul>

        <!-- Section A: All Users (Discovery Zone) -->
        <div class="section-label">
          <i class="ph-bold ph-users-three"></i>
          <span>All Users</span>
        </div>
        <ul id="all-users-list"></ul>

      </div>
    </div>
    
    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-header">
        <div class="chat-header-info">
          <div class="avatar"><i class="ph-fill ph-user-circle"></i></div>
          <h3 id="chat-with-header">Select a friend to chat</h3>
        </div>
        <div class="chat-header-actions">
          <button id="voice-call-btn" class="call-btn hidden" title="Voice Call">
            <i class="ph-fill ph-phone"></i>
          </button>
          <button id="video-call-btn" class="call-btn hidden" title="Video Call">
            <i class="ph-fill ph-video-camera"></i>
          </button>
          <button id="verify-contact-btn" class="small-btn hidden">
            <i class="ph-bold ph-fingerprint"></i> Verify Identity
          </button>
        </div>
      </div>
      
      <div class="message-list" id="message-list">
        <!-- Messages will appear here -->
      </div>
      
      <div id="typing-indicator" class="hidden" style="padding: 5px 20px; font-size: 12px; font-style: italic; color: var(--text-muted); background: var(--bg-color);"></div>

      <div class="message-input-area">
        <div class="input-wrapper">
          <input type="text" id="message-input" placeholder="Type an encrypted message..." disabled>
          <button id="send-btn" disabled>
            <i class="ph-bold ph-paper-plane-right"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Verify Identity Modal ─────────────────────────────────────────── -->
  <div id="verify-modal" class="hidden modal-overlay">
    <div class="modal card">
      <div class="modal-header">
        <h3><i class="ph-bold ph-shield-check"></i> Verify Identity</h3>
      </div>
      <p class="subtitle" style="margin-top: 10px;">Compare these fingerprints out-of-band to prevent MITM attacks.</p>
      
      <div style="margin: 20px 0; text-align: left;">
        <p style="color: var(--text-muted); font-size: 12px; margin-bottom: 5px;">Your Fingerprint:</p>
        <div id="my-fingerprint" style="font-family: monospace; word-break: break-all; background: var(--bg-color); padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); font-size: 12px;">Loading...</div>
      </div>
      
      <div style="text-align: left; margin-bottom: 20px;">
        <p id="their-fingerprint-label" style="color: var(--text-muted); font-size: 12px; margin-bottom: 5px;">Their Fingerprint:</p>
        <div id="their-fingerprint" style="font-family: monospace; word-break: break-all; background: var(--bg-color); padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); font-size: 12px;">Loading...</div>
      </div>
      
      <button id="close-verify-btn" class="primary-btn">Close</button>
    </div>
  </div>

  <!-- ─── Incoming Call Banner ─────────────────────────────────────────── -->
  <div id="incoming-call-banner" class="hidden">
    <div class="incoming-call-avatar">
      <i class="ph-fill ph-user-circle"></i>
      <span class="call-ring-pulse"></span>
    </div>
    <div class="incoming-call-info">
      <span id="incoming-caller-name" class="incoming-caller-name"></span>
      <span id="incoming-call-type" class="incoming-call-type"></span>
    </div>
    <div class="incoming-call-actions">
      <button id="accept-call-btn" class="call-accept-btn" title="Accept">
        <i class="ph-fill ph-phone"></i>
      </button>
      <button id="decline-call-btn" class="call-decline-btn" title="Decline">
        <i class="ph-fill ph-phone-x"></i>
      </button>
    </div>
  </div>

  <!-- ─── Active Call Overlay ──────────────────────────────────────────── -->
  <div id="call-overlay" class="hidden">
    <!-- Remote full-screen video -->
    <video id="remote-video" autoplay playsinline></video>

    <!-- Top bar: peer info + timer -->
    <div class="call-top-bar">
      <div class="call-peer-info">
        <div class="call-avatar-wrapper">
          <i class="ph-fill ph-user-circle"></i>
        </div>
        <div>
          <div id="call-peer-name" class="call-peer-name"></div>
          <div id="call-status" class="call-status-text"></div>
        </div>
      </div>
      <div id="call-timer" class="call-timer">00:00</div>
    </div>

    <!-- Local PiP video -->
    <video id="local-video" autoplay playsinline muted class="local-pip"></video>

    <!-- Controls -->
    <div class="call-controls">
      <button id="call-mute-btn" class="call-ctrl-btn" title="Mute">
        <i class="ph-fill ph-microphone"></i>
        <span>Mute</span>
      </button>
      <button id="call-camera-btn" class="call-ctrl-btn hidden" title="Turn camera off">
        <i class="ph-fill ph-video-camera"></i>
        <span>Camera</span>
      </button>
      <button id="call-hangup-btn" class="call-ctrl-btn hangup-btn" title="Hang up">
        <i class="ph-fill ph-phone-x"></i>
        <span>End</span>
      </button>
    </div>
  </div>

  <!-- Crypto utilities (global helpers used by ChatController) -->
  <script src="crypto.js"></script>

  <!-- ── Models (pure state, no side effects) ── -->
  <script src="models/AuthModel.js"></script>
  <script src="models/UserModel.js"></script>
  <script src="models/ChatModel.js"></script>

  <!-- ── Views (DOM wrappers, no business logic) ── -->
  <script src="views/AuthView.js"></script>
  <script src="views/ToastView.js"></script>
  <script src="views/ChatView.js"></script>
  <script src="views/SidebarView.js"></script>
  <script src="views/CallView.js"></script>

  <!-- ── Controllers (orchestration, loaded in dependency order) ── -->
  <script src="controllers/SocketController.js"></script>
  <script src="controllers/FriendController.js"></script>
  <script src="controllers/ChatController.js"></script>
  <script src="controllers/AuthController.js"></script>
  <script src="controllers/CallController.js"></script>

  <!-- ── Entry Point (creates instances + wires dependencies) ── -->
  <script src="app.js"></script>
</body>
</html>
